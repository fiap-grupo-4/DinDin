services:
  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
      args:
        - TRANSACTIONS_APP_URL=http://transactions:3001
    ports:
      - "3000:3000"
    environment:
      - TRANSACTIONS_APP_URL=http://transactions:3001
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - transactions
      - json-server-api

  transactions:
    build:
      context: .
      dockerfile: ./apps/transactions/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - json-server-api

  json-server-api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./config/db/db.json:/app/db.json
    ports:
      - "4000:4000"
    command: sh -c "npm install -g json-server && json-server --watch db.json --port 4000 --host 0.0.0.0 --static ''"
